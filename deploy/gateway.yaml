# ─────────────────────────────────────────────────────────────────
# DevStagingEnvironment CR — API Gateway
#
# The gateway is the public-facing HTTP entry point. It reverse-proxies
# to the orders and inventory services using their in-cluster DNS names.
#
# The operator resolves service URLs from sibling DevStagingEnvironments
# via the ORDERS_SERVICE_URL and INVENTORY_SERVICE_URL env vars.
# ─────────────────────────────────────────────────────────────────
apiVersion: apps.example.com/v1alpha1
kind: DevStagingEnvironment
metadata:
  name: microservices-gateway-dev
  labels:
    app.kubernetes.io/part-of: microservices-demo
    app.kubernetes.io/component: gateway
    app.kubernetes.io/managed-by: kindling
spec:
  deployment:
    image: ms-gateway:dev
    replicas: 1
    port: 9090
    env:
      - name: ORDERS_URL
        value: "http://microservices-orders-dev:5000"
      - name: INVENTORY_URL
        value: "http://microservices-inventory-dev:3000"
      # Auth0 OIDC — set via: kindling secrets set AUTH0_DOMAIN <value>
      - name: AUTH0_DOMAIN
        valueFrom:
          secretKeyRef:
            name: kindling-secrets
            key: AUTH0_DOMAIN
            optional: true
      - name: AUTH0_CLIENT_ID
        valueFrom:
          secretKeyRef:
            name: kindling-secrets
            key: AUTH0_CLIENT_ID
            optional: true
      - name: AUTH0_CLIENT_SECRET
        valueFrom:
          secretKeyRef:
            name: kindling-secrets
            key: AUTH0_CLIENT_SECRET
            optional: true
      - name: SESSION_SECRET
        valueFrom:
          secretKeyRef:
            name: kindling-secrets
            key: SESSION_SECRET
            optional: true
      # Stripe webhook signature verification
      - name: STRIPE_WEBHOOK_SECRET
        valueFrom:
          secretKeyRef:
            name: kindling-secrets
            key: STRIPE_WEBHOOK_SECRET
            optional: true
      # Public tunnel URL for OAuth callbacks
      - name: PUBLIC_URL
        valueFrom:
          secretKeyRef:
            name: kindling-secrets
            key: PUBLIC_URL
            optional: true
    healthCheck:
      path: /-/ready

  service:
    port: 9090
    type: ClusterIP

  # ── Ingress ────────────────────────────────────────────────────
  # The gateway is the public entry point — expose it via Ingress.
  # Works out of the box with ingress-nginx on Kind.
  # Access via: http://gateway.localhost
  ingress:
    enabled: true
    host: gateway.localhost
    ingressClassName: nginx
